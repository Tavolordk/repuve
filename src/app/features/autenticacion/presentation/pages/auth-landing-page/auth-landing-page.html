<app-auth-shell [logoSrc]="'images/GOBMX.png'" [title]="'Registro Publico Vehicular'" [subtitle]="'Sujetos obligados'">

    <div class="landing-step">
        <div class="landing-title">¿Qué deseas hacer?</div>

        <p class="landing-subtitle">
            Selecciona una opción para continuar con el proceso.
        </p>

        <div class="landing-actions">
            <button type="button" class="btn btn-login landing-btn" (click)="goToCrearCuenta()">
                Crear cuenta
            </button>

            <button type="button" class="btn btn-outline-step landing-btn" (click)="goToGenerarContrasena()">
                Generar contraseña
            </button>
        </div>
    </div>

</app-auth-shell>
