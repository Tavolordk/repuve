<app-auth-shell [logoSrc]="'images/GOBMX.png'" [title]="'Registro Publico Vehicular<br>REPUVE'"
    [subtitle]="'Sujetos obligados'">
    <form class="login-form" (ngSubmit)="submit()">
        <div class="field-block">
            <label class="field-label" for="usuario">Cuenta de usuario</label>
            <input id="usuario" name="usuario" type="text" class="field-input" [(ngModel)]="model.usuario" />
        </div>

        <div class="field-block">
            <label class="field-label" for="correoElectronico">Correo</label>
            <input id="correoElectronico" name="correoElectronico" type="email" class="field-input"
                [(ngModel)]="model.correoElectronico" />
        </div>

        <div class="field-block">
            <label class="field-label" for="numeroCelular">Numero de celular</label>

            <div class="phone-row">
                <div class="phone-prefix">+52</div>
                <input id="numeroCelular" name="numeroCelular" type="text" class="phone-input"
                    [(ngModel)]="model.numeroCelular" />
            </div>
        </div>

        <div class="captcha-wrapper">
            @if (loadingCaptcha) {
            <div class="captcha-loading">Cargando captcha...</div>
            } @else if (captchaImageSrc) {
            <img class="captcha-image" [src]="captchaImageSrc" alt="Captcha" />
            }

            <button type="button" class="refresh-link" (click)="loadCaptcha()">
                Refrescar codigo
            </button>
        </div>

        <div class="field-block">
            <input id="captchaRespuesta" name="captchaRespuesta" type="text" class="field-input"
                placeholder="Ingrese el codigo" [(ngModel)]="model.captchaRespuesta" />
        </div>

        @if (errorMessage) {
        <div class="error-box">
            {{ errorMessage }}
        </div>
        }

        <button type="submit" class="btn btn-login w-100" [disabled]="submitting">
            {{ submitting ? 'Procesando...' : 'Crear cuenta' }}
        </button>
    </form>
</app-auth-shell>

<app-access-feedback-modal [isOpen]="modalState.isOpen" [variant]="modalState.variant" [message]="modalState.message"
    [emailMasked]="modalState.emailMasked" [buttonText]="'Aceptar'" [showMailIcon]="modalState.variant === 'success'"
    (closed)="closeModal()" (accepted)="onModalAccept()">
</app-access-feedback-modal>
