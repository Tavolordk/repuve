<app-form-shell [logoSrc]="'images/GOBMX.png'" [title]="'Registro de sujetos obligados'" [subtitle]="'Datos generales'"
    [currentStep]="1" [totalSteps]="2">
    <form (ngSubmit)="next()">
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label-custom">Nombre(s)</label>
                <input type="text" class="form-control-custom" [(ngModel)]="model.nombre" name="nombre" />
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label-custom">Apellidos</label>
                <input type="text" class="form-control-custom" [(ngModel)]="model.apellidos" name="apellidos" />
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label-custom">CURP</label>
                <input type="text" class="form-control-custom" [(ngModel)]="model.curp" name="curp" />
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label-custom">Correo electronico</label>
                <input type="email" class="form-control-custom" [(ngModel)]="model.correo" name="correo" />
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label-custom">Telefono</label>
                <input type="text" class="form-control-custom" [(ngModel)]="model.telefono" name="telefono" />
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-next">Continuar</button>
        </div>
    </form>
</app-form-shell>
